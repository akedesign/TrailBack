<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrailBack">
<meta name="theme-color" content="#0a0f0d">
<title>TrailBack — นำทางกลับปลอดภัย</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #0a0f0d; font-family: -apple-system, 'Helvetica Neue', sans-serif; color: #e8f5e9; overflow: hidden; }

.app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; }

/* HEADER */
.header { background: #111a13; padding: env(safe-area-inset-top, 12px) 16px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid #1e3324; flex-shrink: 0; }
.logo { font-size: 17px; font-weight: 600; color: #4ade80; letter-spacing: 0.04em; display: flex; align-items: center; gap: 8px; }
.logo svg { width: 22px; height: 22px; }
.gps-pill { display: flex; align-items: center; gap: 6px; background: #0d2b16; border: 0.5px solid #1e6e38; border-radius: 20px; padding: 4px 10px; }
.gps-dot { width: 8px; height: 8px; border-radius: 50%; background: #6b8c72; flex-shrink: 0; transition: background 0.3s; }
.gps-dot.active { background: #4ade80; animation: blink 2s infinite; }
.gps-dot.error { background: #ef4444; animation: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.gps-text { font-size: 11px; color: #6b8c72; white-space: nowrap; }

/* MAP */
.map-wrap { position: relative; flex: 1 1 auto; min-height: 0; background: #0d1a10; overflow: hidden; }
#trailCanvas { display: block; width: 100%; height: 100%; }

.compass { position: absolute; top: 14px; right: 14px; width: 68px; height: 68px; }
.compass svg { width: 100%; height: 100%; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6)); }

.map-legend { position: absolute; bottom: 12px; left: 12px; display: flex; flex-direction: column; gap: 5px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #6b8c72; }
.ldot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.scale-bar { position: absolute; bottom: 12px; right: 14px; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.scale-line { height: 2px; background: #4ade80; min-width: 40px; }
.scale-label { font-size: 10px; color: #6b8c72; font-variant-numeric: tabular-nums; }

/* PANEL */
.panel { background: #0e160f; border-top: 0.5px solid #1e3324; flex-shrink: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; max-height: 52vh; padding-bottom: env(safe-area-inset-bottom, 12px); }

/* NAV CARD */
.nav-card { display: none; margin: 12px 14px 0; background: #111a13; border: 1px solid #1e6e38; border-radius: 14px; padding: 12px 14px; }
.nav-row { display: flex; align-items: center; gap: 12px; }
.arrow-circle { width: 52px; height: 52px; border-radius: 50%; background: #0d2b16; border: 0.5px solid #1e6e38; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-meta { flex: 1; }
.nav-inst { font-size: 17px; font-weight: 600; color: #4ade80; }
.nav-sub { font-size: 11px; color: #6b8c72; margin-top: 2px; }
.nav-dist { text-align: right; }
.nav-dist-val { font-size: 22px; font-weight: 600; color: #e8f5e9; }
.nav-dist-unit { font-size: 11px; color: #6b8c72; }
.arrival-bar { margin-top: 10px; height: 3px; background: #1e3324; border-radius: 2px; overflow: hidden; }
.arrival-fill { height: 100%; background: #4ade80; border-radius: 2px; transition: width 0.5s; width: 0%; }

/* STATS ROW */
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 12px 14px 0; }
.stat-card { background: #111a13; border: 0.5px solid #1e3324; border-radius: 10px; padding: 10px 10px 8px; }
.stat-label { font-size: 10px; color: #6b8c72; margin-bottom: 4px; }
.stat-val { font-size: 18px; font-weight: 600; color: #e8f5e9; line-height: 1; }
.stat-unit { font-size: 10px; color: #6b8c72; font-weight: 400; }

/* ALERT */
.alert-bar { display: none; margin: 10px 14px 0; background: #0f2b1a; border: 0.5px solid #1e6e38; border-radius: 10px; padding: 9px 12px; font-size: 12px; color: #86efac; }
.alert-bar.danger { background: #1a0f0f; border-color: #7f1d1d; color: #fca5a5; }

/* SECTION */
.section { padding: 12px 14px 0; }
.section-title { font-size: 11px; color: #4ade80; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.wp-count { background: #0d2b16; color: #4ade80; font-size: 10px; padding: 2px 7px; border-radius: 20px; border: 0.5px solid #1e6e38; }

/* WAYPOINT LIST */
.wp-list { display: flex; flex-direction: column; gap: 6px; }
.wp-item { background: #111a13; border: 0.5px solid #1e3324; border-radius: 10px; padding: 9px 12px; display: flex; align-items: center; gap: 10px; }
.wp-item.active-target { border-color: #4ade80; }
.wp-num { width: 28px; height: 28px; border-radius: 50%; background: #fbbf24; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #451a03; flex-shrink: 0; }
.wp-num.target { background: #ef4444; color: #fff; animation: pulse2 1.5s infinite; }
@keyframes pulse2 { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.wp-info { flex: 1; min-width: 0; }
.wp-name { font-size: 13px; font-weight: 500; color: #e8f5e9; }
.wp-coord { font-size: 10px; color: #6b8c72; font-family: 'Courier New', monospace; margin-top: 2px; }
.wp-actions { display: flex; gap: 6px; flex-shrink: 0; }
.wp-btn { background: none; border: 0.5px solid #1e3324; border-radius: 6px; color: #6b8c72; cursor: pointer; padding: 4px 8px; font-size: 11px; }
.wp-btn:active { background: #1e3324; }
.wp-btn.nav { color: #4ade80; border-color: #1e6e38; }
.wp-empty { font-size: 12px; color: #6b8c72; text-align: center; padding: 18px; }

/* BUTTONS */
.btn-section { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn { border: none; border-radius: 12px; padding: 14px 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: transform 0.1s, opacity 0.1s; position: relative; overflow: hidden; }
.btn:active { transform: scale(0.97); opacity: 0.85; }
.btn svg { width: 18px; height: 18px; }
.btn-pin { background: #15803d; color: #fff; }
.btn-return { background: #1d4ed8; color: #fff; }
.btn-stop { background: #111a13; color: #f87171; border: 0.5px solid #7f1d1d; display: none; }
.btn-clear { background: #111a13; color: #6b8c72; border: 0.5px solid #1e3324; display: none; }
.btn-full { grid-column: 1 / -1; }

/* TOAST */
.toast { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 70px); left: 50%; transform: translateX(-50%) translateY(-8px); background: #1a2e1c; border: 0.5px solid #2d6a4f; border-radius: 20px; padding: 8px 16px; font-size: 13px; color: #86efac; white-space: nowrap; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.danger { background: #2d1515; border-color: #7f1d1d; color: #fca5a5; }

/* COMPASS PERMISSION BTN */
.perm-btn { display: none; position: absolute; top: 14px; right: 90px; background: #0d2b16; border: 0.5px solid #1e6e38; border-radius: 8px; padding: 6px 10px; font-size: 11px; color: #4ade80; cursor: pointer; }

/* MODAL for waypoint name */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal { background: #111a13; border: 0.5px solid #2d6a4f; border-radius: 16px; padding: 20px; width: 100%; max-width: 320px; }
.modal h3 { font-size: 16px; color: #4ade80; margin-bottom: 14px; }
.modal input { width: 100%; background: #0a0f0d; border: 0.5px solid #1e6e38; border-radius: 10px; padding: 11px 14px; font-size: 15px; color: #e8f5e9; outline: none; }
.modal input:focus { border-color: #4ade80; }
.modal-coord { font-size: 11px; color: #6b8c72; font-family: 'Courier New', monospace; margin: 8px 0 16px; }
.modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-btn { border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
.modal-btn.cancel { background: #1e3324; color: #6b8c72; }
.modal-btn.confirm { background: #15803d; color: #fff; }
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
      TrailBack
    </div>
    <div class="gps-pill">
      <div class="gps-dot" id="gpsDot"></div>
      <span class="gps-text" id="gpsLabel">รอ GPS...</span>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-wrap">
    <canvas id="trailCanvas"></canvas>

    <!-- Compass -->
    <div class="compass">
      <svg viewBox="0 0 68 68">
        <circle cx="34" cy="34" r="32" fill="#0d1a10" stroke="#2d6a4f" stroke-width="1.5"/>
        <circle cx="34" cy="34" r="26" fill="none" stroke="#1e3324" stroke-width="0.5"/>
        <text x="34" y="12" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="700" font-family="sans-serif">N</text>
        <text x="34" y="62" text-anchor="middle" fill="#6b8c72" font-size="8" font-family="sans-serif">S</text>
        <text x="8" y="38" text-anchor="middle" fill="#6b8c72" font-size="8" font-family="sans-serif">W</text>
        <text x="60" y="38" text-anchor="middle" fill="#6b8c72" font-size="8" font-family="sans-serif">E</text>
        <!-- Tick marks -->
        <g stroke="#1e3324" stroke-width="0.5">
          <line x1="34" y1="4" x2="34" y2="10"/>
          <line x1="34" y1="58" x2="34" y2="64"/>
          <line x1="4" y1="34" x2="10" y2="34"/>
          <line x1="58" y1="34" x2="64" y2="34"/>
        </g>
        <g id="compassNeedle" transform="rotate(0 34 34)">
          <polygon points="34,16 31,34 34,31 37,34" fill="#ef4444"/>
          <polygon points="34,52 31,34 34,37 37,34" fill="#6b8c72"/>
        </g>
        <circle cx="34" cy="34" r="3" fill="#0d1a10" stroke="#4ade80" stroke-width="1"/>
      </svg>
    </div>

    <div class="map-legend">
      <div class="legend-item"><div class="ldot" style="background:#4ade80"></div>คุณอยู่ที่นี่</div>
      <div class="legend-item"><div class="ldot" style="background:#fbbf24"></div>Waypoints</div>
      <div class="legend-item"><div class="ldot" style="background:#3b82f6"></div>เส้นทางที่เดิน</div>
      <div class="legend-item" id="returnLegend" style="display:none"><div class="ldot" style="background:#4ade80; border: 1px dashed #4ade80"></div>เส้นนำทางกลับ</div>
    </div>

    <div class="scale-bar">
      <div class="scale-line" id="scaleLine"></div>
      <div class="scale-label" id="scaleLabel">—</div>
    </div>

    <button class="perm-btn" id="permBtn" onclick="requestOrientationPermission()">🧭 เปิดเข็มทิศ</button>
  </div>

  <!-- PANEL -->
  <div class="panel">

    <!-- Nav card -->
    <div class="nav-card" id="navCard">
      <div class="nav-row">
        <div class="arrow-circle">
          <svg id="navArrowSvg" viewBox="0 0 32 32" width="32" height="32">
            <polygon id="navArrow" points="16,5 26,26 16,21 6,26" fill="#4ade80"/>
          </svg>
        </div>
        <div class="nav-meta">
          <div class="nav-inst" id="navInst">ตรงไป</div>
          <div class="nav-sub">มุ่งหน้า → <span id="navTarget">WP1</span></div>
        </div>
        <div class="nav-dist">
          <div class="nav-dist-val" id="navDistVal">—</div>
          <div class="nav-dist-unit" id="navDistUnit">เมตร</div>
        </div>
      </div>
      <div class="arrival-bar"><div class="arrival-fill" id="arrivalFill"></div></div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">ระยะทางรวม</div>
        <div class="stat-val" id="totalDist">0<span class="stat-unit"> ม.</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Waypoints</div>
        <div class="stat-val" id="wpCountStat">0<span class="stat-unit"> จุด</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ทิศเข็มทิศ</div>
        <div class="stat-val" id="headingVal">—<span class="stat-unit"> °</span></div>
      </div>
    </div>

    <!-- Alert -->
    <div class="alert-bar" id="alertBar"></div>

    <!-- Waypoint section -->
    <div class="section">
      <div class="section-title">
        Waypoints ที่ปักหมุด
        <span class="wp-count" id="wpCountBadge">0</span>
      </div>
      <div class="wp-list" id="wpList">
        <div class="wp-empty">ยังไม่มี waypoints<br>กด "ปักหมุดที่นี่" เพื่อบันทึกจุด</div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btn-section">
      <div class="btn-row">
        <button class="btn btn-pin" onclick="openPinModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2"/></svg>
          ปักหมุดที่นี่
        </button>
        <button class="btn btn-return" id="returnBtn" onclick="startReturn()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
          นำทางกลับ
        </button>
      </div>
      <div class="btn-row">
        <button class="btn btn-stop btn-full" id="stopBtn" onclick="stopReturn()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          หยุดนำทาง
        </button>
      </div>
      <div class="btn-row">
        <button class="btn btn-clear btn-full" id="clearBtn" onclick="confirmClear()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          ล้างข้อมูลทั้งหมด
        </button>
      </div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- PIN MODAL -->
<div class="modal-overlay" id="pinModal">
  <div class="modal">
    <h3>📍 ปักหมุด Waypoint</h3>
    <input type="text" id="pinNameInput" placeholder="ชื่อจุด เช่น ทางแยก, ลานพัก..." maxlength="30">
    <div class="modal-coord" id="pinCoordDisplay">กำลังอ่านตำแหน่ง...</div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closePinModal()">ยกเลิก</button>
      <button class="modal-btn confirm" onclick="confirmPin()">บันทึก</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const STORAGE_WP    = 'trailback_wps_v2';
const STORAGE_TRAIL = 'trailback_trail_v2';

let currentPos  = null;   // {lat, lon, acc}
let heading     = 0;      // compass degrees
let headingLocked = false;

let waypoints   = JSON.parse(localStorage.getItem(STORAGE_WP)    || '[]');
let trail       = JSON.parse(localStorage.getItem(STORAGE_TRAIL) || '[]');

let navigating     = false;
let targetIndex    = -1;   // index in waypoints[]
let startDistance  = null; // distance when navigation started
let totalDistM     = 0;

// ─── DOM ─────────────────────────────────────────────────────────────────────
const canvas     = document.getElementById('trailCanvas');
const ctx        = canvas.getContext('2d');
const gpsDot     = document.getElementById('gpsDot');
const gpsLabel   = document.getElementById('gpsLabel');
const wpList     = document.getElementById('wpList');
const navCard    = document.getElementById('navCard');
const stopBtn    = document.getElementById('stopBtn');
const clearBtn   = document.getElementById('clearBtn');
const alertBar   = document.getElementById('alertBar');
const toast      = document.getElementById('toast');
const permBtn    = document.getElementById('permBtn');

// ─── UTILS ───────────────────────────────────────────────────────────────────
const toRad = d => d * Math.PI / 180;
const toDeg = r => r * 180 / Math.PI;

function haversine(a, b) {
  const R = 6371000;
  const dLat = toRad(b.lat - a.lat);
  const dLon = toRad(b.lon - a.lon);
  const s = Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

function bearingTo(from, to) {
  const dLon = toRad(to.lon - from.lon);
  const lat1 = toRad(from.lat), lat2 = toRad(to.lat);
  const y = Math.sin(dLon) * Math.cos(lat2);
  const x = Math.cos(lat1)*Math.sin(lat2) - Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function fmtDist(m) {
  if (m < 1000) return { val: Math.round(m), unit: 'เมตร' };
  return { val: (m/1000).toFixed(2), unit: 'กม.' };
}

function fmtCoord(lat, lon) {
  return lat.toFixed(5) + ', ' + lon.toFixed(5);
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = 'toast show' + (type === 'danger' ? ' danger' : '');
  toastTimer = setTimeout(() => toast.className = 'toast', 3500);
}

// ─── ALERT BAR ───────────────────────────────────────────────────────────────
function showAlert(msg, type) {
  alertBar.textContent = msg;
  alertBar.className = 'alert-bar' + (type === 'danger' ? ' danger' : '');
  alertBar.style.display = 'block';
  if (type !== 'danger') setTimeout(() => alertBar.style.display = 'none', 5000);
}
function hideAlert() { alertBar.style.display = 'none'; }

// ─── MAP DRAWING ──────────────────────────────────────────────────────────────
function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width  = wrap.clientWidth  * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  canvas.style.width  = wrap.clientWidth  + 'px';
  canvas.style.height = wrap.clientHeight + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  drawMap();
}

function getBounds() {
  const all = [];
  trail.forEach(p => all.push(p));
  waypoints.forEach(w => all.push({lat: w.lat, lon: w.lon}));
  if (currentPos) all.push(currentPos);
  if (all.length === 0) return null;
  const pad = 0.0003;
  return {
    minLat: Math.min(...all.map(p=>p.lat)) - pad,
    maxLat: Math.max(...all.map(p=>p.lat)) + pad,
    minLon: Math.min(...all.map(p=>p.lon)) - pad,
    maxLon: Math.max(...all.map(p=>p.lon)) + pad
  };
}

function project(pos, bounds, W, H) {
  if (!bounds) return {x: W/2, y: H/2};
  const margin = 28;
  const px = (pos.lon - bounds.minLon) / (bounds.maxLon - bounds.minLon || 1e-6);
  const py = 1 - (pos.lat - bounds.minLat) / (bounds.maxLat - bounds.minLat || 1e-6);
  return { x: margin + px*(W-margin*2), y: margin + py*(H-margin*2) };
}

function drawMap() {
  const W = canvas.width  / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, W, H);

  // bg
  ctx.fillStyle = '#0d1a10';
  ctx.fillRect(0, 0, W, H);

  const bounds = getBounds();

  // grid
  ctx.strokeStyle = '#111e12';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 10; i++) {
    ctx.beginPath(); ctx.moveTo(W*i/10, 0); ctx.lineTo(W*i/10, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, H*i/10); ctx.lineTo(W, H*i/10); ctx.stroke();
  }

  // trail path
  if (trail.length > 1) {
    ctx.beginPath();
    const p0 = project(trail[0], bounds, W, H);
    ctx.moveTo(p0.x, p0.y);
    for (let i = 1; i < trail.length; i++) {
      const p = project(trail[i], bounds, W, H);
      ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([]);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  }

  // return route line
  if (navigating && currentPos && targetIndex >= 0 && targetIndex < waypoints.length) {
    const cp = project(currentPos, bounds, W, H);
    const wp = waypoints[targetIndex];
    const tp = project({lat: wp.lat, lon: wp.lon}, bounds, W, H);
    ctx.beginPath();
    ctx.setLineDash([8, 5]);
    ctx.strokeStyle = '#4ade80';
    ctx.lineWidth = 2;
    ctx.moveTo(cp.x, cp.y);
    ctx.lineTo(tp.x, tp.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // waypoints
  waypoints.forEach((wp, i) => {
    const p = project({lat: wp.lat, lon: wp.lon}, bounds, W, H);
    const isTarget = (i === targetIndex && navigating);

    if (isTarget) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 18, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(239,68,68,0.15)';
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
    ctx.fillStyle = isTarget ? '#ef4444' : '#fbbf24';
    ctx.fill();
    ctx.strokeStyle = isTarget ? '#fca5a5' : '#92400e';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.fillStyle = isTarget ? '#fff' : '#451a03';
    ctx.font = 'bold 10px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i+1, p.x, p.y);

    // label
    ctx.fillStyle = '#fbbf24';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(wp.label.length > 8 ? wp.label.slice(0,8)+'…' : wp.label, p.x, p.y + 13);
  });

  // current position
  if (currentPos) {
    const cp = project(currentPos, bounds, W, H);

    // accuracy ring
    if (currentPos.acc && bounds) {
      const metersPerDeg = 111320;
      const accDeg = currentPos.acc / metersPerDeg;
      const accPx = accDeg / ((bounds.maxLat - bounds.minLat) || 1e-6) * (H - 56);
      if (accPx > 0 && accPx < 200) {
        ctx.beginPath();
        ctx.arc(cp.x, cp.y, accPx, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(74,222,128,0.06)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(74,222,128,0.2)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    // heading indicator
    const hRad = toRad(heading);
    ctx.beginPath();
    ctx.moveTo(cp.x, cp.y);
    ctx.lineTo(cp.x + Math.sin(hRad)*24, cp.y - Math.cos(hRad)*24);
    ctx.strokeStyle = 'rgba(74,222,128,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // dot
    ctx.beginPath();
    ctx.arc(cp.x, cp.y, 9, 0, Math.PI*2);
    ctx.fillStyle = '#4ade80';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // pulse
    ctx.beginPath();
    ctx.arc(cp.x, cp.y, 16, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(74,222,128,0.3)';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  if (!currentPos && trail.length === 0) {
    ctx.fillStyle = '#1e3324';
    ctx.font = '13px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('กำลังรอสัญญาณ GPS...', W/2, H/2 - 12);
    ctx.fillStyle = '#6b8c72';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillText('กรุณาให้สิทธิ์ตำแหน่งแก่ app นี้', W/2, H/2 + 12);
  }

  // scale bar
  updateScaleBar(bounds, W, H);
}

function updateScaleBar(bounds, W, H) {
  if (!bounds) return;
  const metersPerPx = (bounds.maxLon - bounds.minLon) * 111320 * Math.cos(toRad((bounds.maxLat+bounds.minLat)/2)) / (W - 56);
  const targetPx = 50;
  const targetM = metersPerPx * targetPx;
  let niceDist;
  const steps = [1,2,5,10,20,50,100,200,500,1000,2000,5000];
  niceDist = steps.reduce((prev,cur) => Math.abs(cur-targetM) < Math.abs(prev-targetM) ? cur : prev);
  const barPx = niceDist / metersPerPx;
  document.getElementById('scaleLine').style.width = Math.max(20, barPx) + 'px';
  document.getElementById('scaleLabel').textContent = niceDist >= 1000 ? (niceDist/1000)+'กม.' : niceDist+'ม.';
}

// ─── GPS ─────────────────────────────────────────────────────────────────────
function initGPS() {
  if (!navigator.geolocation) {
    gpsLabel.textContent = 'ไม่รองรับ GPS';
    gpsDot.className = 'gps-dot error';
    showAlert('เบราว์เซอร์นี้ไม่รองรับ GPS', 'danger');
    return;
  }
  navigator.geolocation.watchPosition(
    onGPSSuccess,
    onGPSError,
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 3000 }
  );
}

let lastTrailPoint = null;
let gpsReady = false;

function onGPSSuccess(pos) {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const acc = pos.coords.accuracy;
  currentPos = { lat, lon, acc };

  if (!gpsReady) {
    gpsReady = true;
    gpsDot.className = 'gps-dot active';
    showToast('GPS พร้อมแล้ว ±' + Math.round(acc) + 'ม.');
  }
  gpsLabel.textContent = '±' + Math.round(acc) + 'ม.';
  gpsDot.className = 'gps-dot' + (acc < 20 ? ' active' : acc < 50 ? ' active' : ' active');

  // record trail (only if moved >5m)
  if (!lastTrailPoint || haversine(lastTrailPoint, currentPos) > 5) {
    trail.push({ lat, lon });
    if (trail.length > 1) totalDistM += haversine(trail[trail.length-2], trail[trail.length-1]);
    lastTrailPoint = { lat, lon };
    if (trail.length % 10 === 0) localStorage.setItem(STORAGE_TRAIL, JSON.stringify(trail.slice(-500)));
  }

  const d = fmtDist(totalDistM);
  document.getElementById('totalDist').innerHTML = d.val + '<span class="stat-unit"> ' + d.unit + '</span>';

  // update compass if heading from GPS
  if (pos.coords.heading !== null && !headingLocked) {
    heading = pos.coords.heading;
    updateCompass();
  }

  updateNav();
  drawMap();
}

function onGPSError(err) {
  gpsDot.className = 'gps-dot error';
  const msgs = { 1: 'ไม่ได้รับสิทธิ์ GPS', 2: 'ไม่พบสัญญาณ GPS', 3: 'GPS timeout' };
  gpsLabel.textContent = msgs[err.code] || 'GPS error';
  showAlert((msgs[err.code] || 'GPS error') + ' — กรุณาตรวจสอบการตั้งค่า Location', 'danger');
}

// ─── COMPASS ─────────────────────────────────────────────────────────────────
function updateCompass() {
  document.getElementById('compassNeedle').setAttribute('transform', `rotate(${-heading} 34 34)`);
  document.getElementById('headingVal').innerHTML = Math.round(heading) + '<span class="stat-unit"> °</span>';
}

function requestOrientationPermission() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(r => {
      if (r === 'granted') {
        permBtn.style.display = 'none';
        bindOrientation();
        showToast('เปิดเข็มทิศสำเร็จ');
      }
    }).catch(console.error);
  }
}

function bindOrientation() {
  window.addEventListener('deviceorientationabsolute', handleOrientation, true);
  window.addEventListener('deviceorientation', handleOrientation, true);
}

function handleOrientation(e) {
  let h;
  if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
    h = e.webkitCompassHeading; // iOS
  } else if (e.alpha !== null) {
    h = (360 - e.alpha) % 360; // Android absolute
  }
  if (h !== undefined) {
    heading = h;
    headingLocked = true;
    updateCompass();
  }
}

function initCompass() {
  if (typeof DeviceOrientationEvent !== 'undefined') {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      // iOS 13+ — need user gesture
      permBtn.style.display = 'block';
    } else {
      bindOrientation();
    }
  }
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function updateNav() {
  if (!navigating || !currentPos || targetIndex < 0 || targetIndex >= waypoints.length) return;

  const wp = waypoints[targetIndex];
  const dist = haversine(currentPos, {lat: wp.lat, lon: wp.lon});
  const bear = bearingTo(currentPos, {lat: wp.lat, lon: wp.lon});

  // distance display
  const d = fmtDist(dist);
  document.getElementById('navDistVal').textContent = d.val;
  document.getElementById('navDistUnit').textContent = d.unit;

  // arrival progress bar
  if (startDistance === null) startDistance = dist;
  const progress = startDistance > 0 ? Math.max(0, Math.min(100, (1 - dist/startDistance)*100)) : 0;
  document.getElementById('arrivalFill').style.width = progress + '%';

  // relative bearing → arrow rotation
  const rel = ((bear - heading) + 360) % 360;
  // rotate SVG polygon
  const cx = 16, cy = 16;
  document.getElementById('navArrow').setAttribute('transform', `rotate(${rel} ${cx} ${cy})`);

  // instruction
  let inst = 'เดินตรงไป';
  if      (rel > 337.5 || rel <= 22.5)  inst = 'เดินตรงไป';
  else if (rel > 22.5  && rel <= 67.5)  inst = 'เฉียงขวา';
  else if (rel > 67.5  && rel <= 112.5) inst = 'เลี้ยวขวา';
  else if (rel > 112.5 && rel <= 157.5) inst = 'เฉียงขวามาก';
  else if (rel > 157.5 && rel <= 202.5) inst = 'หันกลับ';
  else if (rel > 202.5 && rel <= 247.5) inst = 'เฉียงซ้ายมาก';
  else if (rel > 247.5 && rel <= 292.5) inst = 'เลี้ยวซ้าย';
  else if (rel > 292.5 && rel <= 337.5) inst = 'เฉียงซ้าย';
  document.getElementById('navInst').textContent = inst;
  document.getElementById('navTarget').textContent = 'WP' + (targetIndex+1) + ' — ' + wp.label;

  // arrival check
  if (dist < 15) {
    if (targetIndex > 0) {
      showToast('✅ ถึง ' + wp.label + ' แล้ว! มุ่งหน้า WP' + targetIndex);
      targetIndex--;
      startDistance = null;
      document.getElementById('navTarget').textContent = 'WP' + (targetIndex+1) + ' — ' + waypoints[targetIndex].label;
      renderWpList();
    } else {
      showToast('🎉 ถึงจุดเริ่มต้นแล้ว! ปลอดภัยแล้ว');
      showAlert('🎉 ถึงจุดหมายแล้ว! คุณปลอดภัยแล้ว');
      stopReturn();
    }
  }
}

function startReturn() {
  if (waypoints.length === 0) { showToast('ยังไม่มี waypoints! ปักหมุดก่อนนะ', 'danger'); return; }
  if (!currentPos) { showToast('รอ GPS ก่อนนะ...', 'danger'); return; }
  navigating  = true;
  targetIndex = waypoints.length - 1;
  startDistance = null;
  navCard.style.display = 'block';
  stopBtn.style.display  = 'flex';
  document.getElementById('returnLegend').style.display = 'flex';
  document.getElementById('returnBtn').style.display = 'none';
  showToast('เริ่มนำทางย้อนกลับ → ' + waypoints[targetIndex].label);
  renderWpList();
  updateNav();
  drawMap();
}

function stopReturn() {
  navigating  = false;
  targetIndex = -1;
  startDistance = null;
  navCard.style.display = 'none';
  stopBtn.style.display  = 'none';
  document.getElementById('returnLegend').style.display = 'none';
  document.getElementById('returnBtn').style.display = '';
  document.getElementById('arrivalFill').style.width = '0%';
  renderWpList();
  drawMap();
}

// ─── WAYPOINTS ────────────────────────────────────────────────────────────────
function openPinModal() {
  if (!currentPos) { showToast('รอ GPS ก่อนนะ...', 'danger'); return; }
  document.getElementById('pinNameInput').value = 'WP' + (waypoints.length + 1);
  document.getElementById('pinCoordDisplay').textContent = fmtCoord(currentPos.lat, currentPos.lon);
  document.getElementById('pinModal').classList.add('show');
  setTimeout(() => document.getElementById('pinNameInput').select(), 100);
}

function closePinModal() {
  document.getElementById('pinModal').classList.remove('show');
}

function confirmPin() {
  if (!currentPos) return;
  const name = document.getElementById('pinNameInput').value.trim() || ('WP' + (waypoints.length + 1));
  waypoints.push({ lat: currentPos.lat, lon: currentPos.lon, label: name, time: Date.now() });
  localStorage.setItem(STORAGE_WP, JSON.stringify(waypoints));
  closePinModal();
  renderWpList();
  drawMap();
  showToast('📍 ปักหมุด "' + name + '" เรียบร้อย!');
}

document.getElementById('pinNameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmPin();
  if (e.key === 'Escape') closePinModal();
});

function deleteWp(i) {
  if (!confirm('ลบ "' + waypoints[i].label + '" ?')) return;
  waypoints.splice(i, 1);
  localStorage.setItem(STORAGE_WP, JSON.stringify(waypoints));
  if (navigating) stopReturn();
  renderWpList();
  drawMap();
}

function navToWp(i) {
  if (!currentPos) { showToast('รอ GPS ก่อนนะ...', 'danger'); return; }
  navigating  = true;
  targetIndex = i;
  startDistance = null;
  navCard.style.display = 'block';
  stopBtn.style.display  = 'flex';
  document.getElementById('returnLegend').style.display = 'flex';
  document.getElementById('returnBtn').style.display = 'none';
  renderWpList();
  updateNav();
  drawMap();
  showToast('นำทางไป ' + waypoints[i].label);
}

function confirmClear() {
  if (!confirm('ล้างข้อมูลทั้งหมด? (waypoints + เส้นทางที่เดิน)')) return;
  waypoints = [];
  trail = [];
  totalDistM = 0;
  lastTrailPoint = null;
  localStorage.removeItem(STORAGE_WP);
  localStorage.removeItem(STORAGE_TRAIL);
  stopReturn();
  renderWpList();
  drawMap();
  document.getElementById('totalDist').innerHTML = '0<span class="stat-unit"> ม.</span>';
  showToast('ล้างข้อมูลแล้ว');
}

function renderWpList() {
  const count = waypoints.length;
  document.getElementById('wpCountStat').innerHTML = count + '<span class="stat-unit"> จุด</span>';
  document.getElementById('wpCountBadge').textContent = count;
  clearBtn.style.display = count > 0 ? '' : 'none';

  if (count === 0) {
    wpList.innerHTML = '<div class="wp-empty">ยังไม่มี waypoints<br>กด "ปักหมุดที่นี่" เพื่อบันทึกจุด</div>';
    return;
  }

  wpList.innerHTML = waypoints.map((wp, i) => {
    const isTarget = navigating && i === targetIndex;
    return `
      <div class="wp-item${isTarget ? ' active-target' : ''}">
        <div class="wp-num${isTarget ? ' target' : ''}">${i+1}</div>
        <div class="wp-info">
          <div class="wp-name">${wp.label}</div>
          <div class="wp-coord">${fmtCoord(wp.lat, wp.lon)}</div>
        </div>
        <div class="wp-actions">
          <button class="wp-btn nav" onclick="navToWp(${i})">นำทาง</button>
          <button class="wp-btn" onclick="deleteWp(${i})">ลบ</button>
        </div>
      </div>
    `;
  }).join('');
}

// ─── MODAL CLOSE ON BACKDROP ─────────────────────────────────────────────────
document.getElementById('pinModal').addEventListener('click', function(e) {
  if (e.target === this) closePinModal();
});

// ─── PREVENT SCROLL BOUNCE on body ───────────────────────────────────────────
document.addEventListener('touchmove', e => {
  if (!e.target.closest('.panel')) e.preventDefault();
}, { passive: false });

// ─── INIT ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
renderWpList();
initGPS();
initCompass();

// auto-save trail every 30s
setInterval(() => {
  if (trail.length > 0) localStorage.setItem(STORAGE_TRAIL, JSON.stringify(trail.slice(-500)));
}, 30000);

// redraw loop for heading animation
setInterval(() => { if (currentPos) drawMap(); }, 2000);
</script>
</body>
